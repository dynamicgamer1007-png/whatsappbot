name: WhatsApp Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20   # ✅ Node 20 has fetch built-in

      - name: Install dependencies
        run: npm install

      - name: Start bot
        run: node bot.js
